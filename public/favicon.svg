<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Sun circle -->
  <circle cx="24" cy="24" r="10" fill="#c8973e"/>
  <!-- Sun rays — 8-pointed star pattern (girih-inspired) -->
  <g stroke="#c8973e" stroke-width="2.2" stroke-linecap="round" fill="none">
    <line x1="24" y1="2" x2="24" y2="10"/>
    <line x1="24" y1="38" x2="24" y2="46"/>
    <line x1="2" y1="24" x2="10" y2="24"/>
    <line x1="38" y1="24" x2="46" y2="24"/>
    <line x1="8.4" y1="8.4" x2="14.4" y2="14.4"/>
    <line x1="33.6" y1="33.6" x2="39.6" y2="39.6"/>
    <line x1="39.6" y1="8.4" x2="33.6" y2="14.4"/>
    <line x1="14.4" y1="33.6" x2="8.4" y2="39.6"/>
  </g>
  <!-- Inner decorative ring -->
  <circle cx="24" cy="24" r="7" fill="none" stroke="#fefdf8" stroke-width="1" opacity="0.5"/>
  <!-- Spring petal accents -->
  <g fill="#e8b4b8" opacity="0.7">
    <ellipse cx="24" cy="3.5" rx="2" ry="3.5" transform="rotate(0 24 24)"/>
    <ellipse cx="24" cy="3.5" rx="2" ry="3.5" transform="rotate(90 24 24)"/>
    <ellipse cx="24" cy="3.5" rx="2" ry="3.5" transform="rotate(180 24 24)"/>
    <ellipse cx="24" cy="3.5" rx="2" ry="3.5" transform="rotate(270 24 24)"/>
  </g>
  <!-- Small teal leaf accents at diagonals -->
  <g fill="#5b9ea6" opacity="0.5">
    <ellipse cx="24" cy="5" rx="1.5" ry="3" transform="rotate(45 24 24)"/>
    <ellipse cx="24" cy="5" rx="1.5" ry="3" transform="rotate(135 24 24)"/>
    <ellipse cx="24" cy="5" rx="1.5" ry="3" transform="rotate(225 24 24)"/>
    <ellipse cx="24" cy="5" rx="1.5" ry="3" transform="rotate(315 24 24)"/>
  </g>
</svg>
